# Nginx reverse proxy in front of the Next.js admin app (`npm start` / Docker on :3000).
# Production host: admin.regkasse.at → upstream 127.0.0.1:3000 (or Docker publish).
#
# Install (example):
#   sudo cp nginx.conf /etc/nginx/sites-available/admin.regkasse.at
#   sudo ln -s /etc/nginx/sites-available/admin.regkasse.at /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: terminate here (Let's Encrypt) or at the load balancer; keep proxy_pass http://upstream.

upstream regkasse_frontend_admin {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS (optional if LB already terminates TLS)
server {
    listen 80;
    listen [::]:80;
    server_name admin.regkasse.at;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.regkasse.at;

    # Replace with your certificate paths (certbot or corporate PKI)
    ssl_certificate     /etc/letsencrypt/live/admin.regkasse.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.regkasse.at/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers (Next.js also sets CSP via next.config.mjs — avoid conflicting CSP here)
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://regkasse_frontend_admin;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Next.js / SignalR / SSE
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_buffering off;
    }
}

# Required for WebSocket upgrade (put in http {} context if not already present):
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
