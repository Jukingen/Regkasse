version: "2"
type: frontend
tech_stack:
  - C#
  - ASP.NET Core
  - Entity Framework Core
  - PostgreSQL
routes:
  - path: /api/health
    file: backend/Controllers/HealthController.cs
    auth_required: false
    description: Backend health endpoint
  - path: /api/Auth/login
    file: backend/Controllers/AuthController.cs
    auth_required: false
    description: Username/email login endpoint
  - path: /api/Auth/me
    file: backend/Controllers/AuthController.cs
    auth_required: true
    description: Returns current authenticated user
  - path: /api/Auth/refresh
    file: backend/Controllers/AuthController.cs
    auth_required: false
    description: Refresh token exchange endpoint
  - path: /api/Auth/logout
    file: backend/Controllers/AuthController.cs
    auth_required: true
    description: Logout current session
  - path: /api/Auth/logout-all
    file: backend/Controllers/AuthController.cs
    auth_required: true
    description: Logout all sessions for current user
features:
  - name: Authentication
    description: Login and token-based auth flows for admin/POS users
    files:
      - backend/Controllers/AuthController.cs
      - backend/Services
    entry_route: /api/Auth/login
    user_interactions:
      - Send email or username with password to login endpoint
      - Use returned bearer token for authorized endpoints
      - Refresh access token with refresh token
      - Logout current or all sessions
    api_calls:
      - method: POST
        endpoint: /api/Auth/login
      - method: GET
        endpoint: /api/Auth/me
      - method: POST
        endpoint: /api/Auth/refresh
      - method: POST
        endpoint: /api/Auth/logout
      - method: POST
        endpoint: /api/Auth/logout-all
    auth_required: false
  - name: API Health Monitoring
    description: Basic liveness/readiness health check
    files:
      - backend/Controllers/HealthController.cs
    entry_route: /api/health
    user_interactions:
      - Call health endpoint before running integration tests
      - Confirm backend is reachable
    api_calls:
      - method: GET
        endpoint: /api/health
    auth_required: false
known_limitations:
  - issue: TestSprite MCP config may default to frontend mode and require manual correction for backend-only suites.
    location: testsprite_tests/tmp/config.json
    impact: Backend plan generation can fail until config is aligned.
