# Dependabot version updates for the Regkasse monorepo.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# After merge to the default branch: GitHub → Insights → Dependency graph → Dependabot,
# or Settings → Code security → Dependabot version updates.

version: 2

updates:
  # --- npm: frontend-admin (Next.js admin) ---------------------------------
  - package-ecosystem: npm
    directory: /frontend-admin
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 8
    labels:
      - dependencies
      - frontend-admin
    groups:
      frontend-admin-minor-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - next
          - react
          - react-dom
          - antd
          - '@ant-design/*'
      frontend-admin-types:
        patterns:
          - '@types/*'
      frontend-admin-lint-format:
        patterns:
          - eslint*
          - prettier
          - '@typescript-eslint/*'
      frontend-admin-test:
        patterns:
          - vitest
          - '@vitest/*'
          - '@testing-library/*'
          - '@playwright/*'
          - jsdom
    # Orval major upgrades need OpenAPI/client regen — review separately
    ignore:
      - dependency-name: orval
        update-types: ['version-update:semver-major']

  # --- npm: POS (Expo) -----------------------------------------------------
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 6
    labels:
      - dependencies
      - frontend-pos
    groups:
      frontend-pos-minor-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - expo
          - react
          - react-native
          - react-dom

  # --- npm: tenant websites ------------------------------------------------
  - package-ecosystem: npm
    directory: /frontend-sites
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 4
    labels:
      - dependencies
      - frontend-sites
    groups:
      frontend-sites-minor-patch:
        update-types:
          - minor
          - patch

  # --- npm: repo root + scripts tooling ------------------------------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      root-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /scripts
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      scripts-minor-patch:
        update-types:
          - minor
          - patch

  # --- NuGet: ASP.NET Core API ---------------------------------------------
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch
        exclude-patterns:
          - Microsoft.AspNetCore.*
          - Microsoft.EntityFrameworkCore.*
          - Npgsql*

  # --- GitHub Actions ------------------------------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - '*'

  # --- Docker: frontend-admin image ----------------------------------------
  - package-ecosystem: docker
    directory: /frontend-admin
    schedule:
      interval: weekly
      day: saturday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
