# Auto-regenerate frontend-admin Orval client when backend/swagger.json changes.
#
# Commits generated files back to the same branch. Path filter is swagger-only so
# the follow-up push of `src/api/generated/**` does not re-trigger this workflow.
#
# Requires: Actions → Workflow permissions → Read and write (or a PAT with contents:write
# if the default branch is protected and rejects GITHUB_TOKEN pushes).

name: API client auto-generate

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/swagger.json'
  workflow_dispatch:

concurrency:
  group: api-client-auto-generate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  NODE_VERSION: '22'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  generate-and-commit:
    name: generate:api + commit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Do not loop on commits authored by this workflow.
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: frontend-admin/node_modules
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-${{ hashFiles('frontend-admin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-

      - name: Install frontend-admin dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: frontend-admin
        run: npm ci

      - name: Regenerate Orval client
        working-directory: frontend-admin
        run: npm run generate:api

      - name: Commit and push generated client (if changed)
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend-admin/src/api/generated
          if git diff --staged --quiet; then
            echo "Generated client already up to date — nothing to commit."
          else
            git commit -m "$(cat <<'EOF'
          chore(api): regenerate Orval client from swagger.json

          Autogenerated by api-client-auto-generate workflow.
          EOF
          )"
            git push
            echo "Pushed regenerated Orval client."
          fi

      - name: Verify client matches swagger.json
        run: node scripts/verify-api-client.mjs

  notify-failure:
    name: Notify on failure
    needs: [generate-and-commit]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: API client auto-generate failed
    secrets: inherit
