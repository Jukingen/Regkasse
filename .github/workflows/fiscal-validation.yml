name: Fiscal go-live validation

on:
#  push:
#    branches: [main]
#  pull_request:
#    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  fiscal-validation:
    name: Migrate & validate fiscal schema
    runs-on: ubuntu-latest

    # Requires repository secret CI_POSTGRES_PASSWORD (same value used for the service and EF/psql).
    env:
      ConnectionStrings__DefaultConnection: >-
        Host=localhost;Port=5432;Database=regkasse;Username=postgres;Password=${{ secrets.CI_POSTGRES_PASSWORD }}
      DATABASE_URL: postgresql://postgres:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/regkasse

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: regkasse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        working-directory: backend
        run: dotnet restore

      - name: Build project
        working-directory: backend
        run: dotnet build --no-restore

      - name: Install PostgreSQL client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply migrations
        working-directory: backend
        run: >-
          dotnet ef database update
          --project KasseAPI_Final.csproj
          --startup-project KasseAPI_Final.csproj

      - name: Run fiscal go-live validation
        run: bash scripts/run_fiscal_go_live_validation.sh

      - name: Upload fiscal validation report (artifact)
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: fiscal-validation-report
          path: fiscal_validation_report.txt
