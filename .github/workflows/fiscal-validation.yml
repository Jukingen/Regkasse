name: Fiscal go-live validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  fiscal-validation:
    name: Migrate & validate fiscal schema
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: regkasse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore dependencies
        working-directory: backend
        run: dotnet restore

      - name: Build project
        working-directory: backend
        run: dotnet build --no-restore

      - name: Install PostgreSQL client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply migrations
        working-directory: backend
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=regkasse;Username=postgres;Password=postgres"
        run: dotnet ef database update --connection "Host=localhost;Port=5432;Database=regkasse;Username=postgres;Password=postgres"

      - name: Run fiscal go-live validation
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/regkasse"
        run: bash scripts/run_fiscal_go_live_validation.sh

      - name: Upload fiscal validation report (artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: fiscal-validation-report
          path: fiscal_validation_report.txt
