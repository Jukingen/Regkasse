# Backend unit / in-memory integration tests (excludes PostgreSQL-tagged).
# Full suite local: scripts/run-all-tests.sh or `dotnet test` in backend/.
# PostgreSQL-tagged: backend-postgres-integration-tests.yml

name: Backend unit tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-unit-tests.yml'
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-unit-tests.yml'
  workflow_dispatch:

concurrency:
  group: backend-unit-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  CI: 'true'
  # Do not inherit developer REGKASSE_* env that would force OpenAPI/in-memory host mode.
  REGKASSE_OPENAPI_EXPORT: ''
  REGKASSE_TEST_INMEMORY_DB: ''

jobs:
  unit-tests:
    name: dotnet build + test (exclude Category=PostgreSql)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: backend
        run: dotnet restore KasseAPI_Final.sln

      - name: Build
        working-directory: backend
        run: dotnet build KasseAPI_Final.sln --configuration Release --no-restore

      - name: Test
        working-directory: backend
        run: >-
          dotnet test KasseAPI_Final.Tests/KasseAPI_Final.Tests.csproj
          --configuration Release
          --no-build
          --filter "Category!=PostgreSql"
          --verbosity minimal

  notify-failure:
    name: Notify on failure
    needs: [unit-tests]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: Backend unit tests failed
    secrets: inherit
