# Frontend Admin — quality gate (lint, typecheck, unit tests, build, E2E)
#
# Docs: frontend-admin/docs/CI_CD.md · README “CI/CD”
# Node 22 aligns with @testing-library/jest-dom@7 and Dockerfile NODE_VERSION.

name: Frontend Admin CI

on:
  pull_request:
    paths:
      - 'frontend-admin/**'
      - 'backend/Authorization/AppPermissions.cs'
      - 'scripts/verify-permission-keys.mjs'
      - 'scripts/verify-menu-permissions.mjs'
      - 'localization/**'
      - '.github/workflows/frontend-admin-ci.yml'
      - '.github/workflows/frontend-admin-e2e.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'frontend-admin/**'
      - 'backend/Authorization/AppPermissions.cs'
      - 'scripts/verify-permission-keys.mjs'
      - 'scripts/verify-menu-permissions.mjs'
      - 'localization/**'
      - '.github/workflows/frontend-admin-ci.yml'
      - '.github/workflows/frontend-admin-e2e.yml'
  workflow_dispatch:

concurrency:
  group: frontend-admin-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  NODE_VERSION: '22'
  WORKING_DIRECTORY: frontend-admin

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend-admin
    env:
      NEXT_PUBLIC_RKSV_ENVIRONMENT: TEST
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:5184

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: frontend-admin/node_modules
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-${{ hashFiles('frontend-admin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-

      - name: Cache Next.js build cache
        uses: actions/cache@v6
        with:
          path: frontend-admin/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('frontend-admin/package-lock.json') }}-${{ hashFiles('frontend-admin/next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Permission key consistency
        working-directory: ${{ github.workspace }}
        run: node scripts/verify-permission-keys.mjs

      - name: Menu permission mapping
        working-directory: ${{ github.workspace }}
        run: node scripts/verify-menu-permissions.mjs --include-secondary

      - name: npm run lint
        run: npm run lint

      - name: npm run typecheck
        run: npm run typecheck

      - name: npm run test
        run: npm run test

      - name: i18n validate (strict missing)
        working-directory: ${{ github.workspace }}
        run: >
          node localization/scripts/validate-translations.mjs
          --app frontend-admin
          --strictMissing true
          --orphanPolicy error

      - name: i18n usage (strict missing)
        working-directory: ${{ github.workspace }}
        run: >
          node localization/scripts/check-localization-usage.mjs
          --app frontend-admin
          --strictMissing true
          --budgetFile localization/i18n-ci-budgets.json

      - name: npm run build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend-admin
    env:
      NEXT_PUBLIC_RKSV_ENVIRONMENT: TEST
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:5184
      E2E_PORT: '3000'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: frontend-admin/node_modules
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-${{ hashFiles('frontend-admin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-

      - name: Cache Next.js build cache
        uses: actions/cache@v6
        with:
          path: frontend-admin/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('frontend-admin/package-lock.json') }}-${{ hashFiles('frontend-admin/next.config.mjs') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: npm run build
        run: npm run build

      - name: npm run test:e2e
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-ci
          path: |
            frontend-admin/playwright-report
            frontend-admin/test-results
          retention-days: 7

  notify-failure:
    name: Notify on failure
    needs: [quality, e2e]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: Frontend Admin CI failed
    secrets: inherit
