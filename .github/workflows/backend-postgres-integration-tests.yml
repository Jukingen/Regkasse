# PostgreSQL-backed xUnit tests ([Trait("Category", "PostgreSql")]).
# CI: ephemeral Postgres service + REGKASSE_TEST_POSTGRES (fixture migrates; tests run, not skipped).
# Local: Docker + Testcontainers, or set REGKASSE_TEST_POSTGRES yourself (see docs/backend-postgresql-integration-tests.md).

name: Backend PostgreSQL integration tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-postgres-integration-tests.yml'
      - 'docs/backend-postgresql-integration-tests.md'
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-postgres-integration-tests.yml'
      - 'docs/backend-postgresql-integration-tests.md'
  workflow_dispatch:

concurrency:
  group: backend-pg-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  CI: 'true'
  # Ephemeral CI database only (matches services.postgres below).
  REGKASSE_TEST_POSTGRES: 'Host=localhost;Port=5432;Database=regkasse_pg_integration;Username=postgres;Password=postgres'
  # Ensure cold schema even if the integration DB name ever diverges from fixture defaults.
  REGKASSE_TEST_POSTGRES_RESET: '1'

jobs:
  postgres-integration:
    name: dotnet build + test (Category=PostgreSql)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: regkasse_pg_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d regkasse_pg_integration"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        working-directory: backend
        run: dotnet restore KasseAPI_Final.sln

      - name: Build
        working-directory: backend
        run: dotnet build KasseAPI_Final.sln --configuration Release --no-restore

      - name: Run PostgreSQL-tagged tests
        working-directory: backend
        run: >-
          dotnet test KasseAPI_Final.Tests/KasseAPI_Final.Tests.csproj
          --configuration Release
          --no-build
          --filter "Category=PostgreSql"
          --verbosity minimal

  notify-failure:
    name: Notify on failure
    needs: [postgres-integration]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: Backend PostgreSQL integration tests failed
    secrets: inherit
