name: API contract tests (OpenAPI + backend + Admin/POS smoke)

# Critical route/schema checks, DTO contract tests, Orval smoke, and payment-focused frontend tests.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: api-contract-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  CI: 'true'

jobs:
  contract-tests:
    name: Schema validation + contract + smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend-admin/package-lock.json
            frontend/package-lock.json

      - name: Validate critical OpenAPI paths and schemas
        run: node scripts/validate-critical-openapi-paths.mjs

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Backend contract tests (DTO + OpenAPI paths)
        working-directory: backend
        run: >
          dotnet test KasseAPI_Final.Tests/KasseAPI_Final.Tests.csproj
          --verbosity minimal
          --filter "FullyQualifiedName~PaymentApiContractTests|FullyQualifiedName~OpenApiCriticalPathsContractTests"

      - name: Install frontend-admin dependencies
        working-directory: frontend-admin
        run: npm ci

      - name: Admin contract + generated client smoke
        working-directory: frontend-admin
        run: npm run test:contract

      - name: Install POS (frontend) dependencies
        working-directory: frontend
        run: npm ci

      - name: POS payment contract tests
        working-directory: frontend
        run: npm run test:contract
