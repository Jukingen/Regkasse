name: API contract tests (OpenAPI + backend + Admin/POS smoke)

# Critical route/schema checks, DTO contract tests, Orval smoke, and payment-focused frontend tests.

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend-admin/**'
      - 'frontend/**'
      - 'scripts/validate-critical-openapi-paths.mjs'
      - '.github/workflows/api-contract-tests.yml'
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - 'frontend-admin/**'
      - 'frontend/**'
      - 'scripts/validate-critical-openapi-paths.mjs'
      - '.github/workflows/api-contract-tests.yml'
  workflow_dispatch:

concurrency:
  group: api-contract-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22'
  CI: 'true'

jobs:
  contract-tests:
    name: Schema validation + contract + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          # @testing-library/jest-dom@7 requires Node >= 22
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend-admin/package-lock.json
            frontend/package-lock.json

      - name: Cache frontend-admin node_modules
        id: cache-fa-nm
        uses: actions/cache@v6
        with:
          path: frontend-admin/node_modules
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-${{ hashFiles('frontend-admin/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-fa-nm-

      - name: Cache POS node_modules
        id: cache-pos-nm
        uses: actions/cache@v6
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-pos-nm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-pos-nm-

      - name: Validate critical OpenAPI paths and schemas
        run: node scripts/validate-critical-openapi-paths.mjs

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('backend/**/*.csproj', 'backend/**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore + build backend tests
        working-directory: backend
        run: |
          dotnet restore KasseAPI_Final.Tests/KasseAPI_Final.Tests.csproj
          dotnet build KasseAPI_Final.Tests/KasseAPI_Final.Tests.csproj --configuration Release --no-restore

      - name: Backend contract tests (DTO + OpenAPI paths)
        working-directory: backend
        run: >
          dotnet test KasseAPI_Final.Tests/KasseAPI_Final.Tests.csproj
          --configuration Release
          --no-build
          --verbosity minimal
          --filter "FullyQualifiedName~PaymentApiContractTests|FullyQualifiedName~OpenApiCriticalPathsContractTests|FullyQualifiedName~OpenApiToolingGenerationTests"

      - name: Install frontend-admin dependencies
        if: steps.cache-fa-nm.outputs.cache-hit != 'true'
        working-directory: frontend-admin
        run: npm ci

      - name: Admin contract + generated client smoke
        working-directory: frontend-admin
        run: npm run test:contract

      - name: Install POS (frontend) dependencies
        if: steps.cache-pos-nm.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: POS payment contract tests
        working-directory: frontend
        run: npm run test:contract

  notify-failure:
    name: Notify on failure
    needs: [contract-tests]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: API contract tests failed
    secrets: inherit
