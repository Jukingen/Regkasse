# POS frontend (Expo / React Native) — lint, typecheck, unit tests

name: Frontend POS CI

on:
  pull_request:
    paths:
      - 'frontend/**'
      - 'localization/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'localization/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  NODE_VERSION: '22'

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-pos-nm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-pos-nm-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps

      - name: npm run lint
        run: npm run lint

      - name: npm run typecheck
        run: npm run typecheck

      - name: npm run test
        run: npm run test

      - name: i18n validate (strict missing)
        working-directory: ${{ github.workspace }}
        run: >
          node localization/scripts/validate-translations.mjs
          --app frontend
          --strictMissing true

  notify-failure:
    name: Notify on failure
    needs: [quality]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: Frontend POS CI failed
    secrets: inherit
