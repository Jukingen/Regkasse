name: TestSprite specs & API smoke

# Spec validation always runs (YAML ↔ swagger.json).
# Live API smoke: workflow_dispatch with live_smoke=true (+ optional secrets).

on:
  pull_request:
    paths:
      - 'testsprite/**'
      - 'testsprite.config.json'
      - 'backend/swagger.json'
      - '.github/workflows/testsprite.yml'
  push:
    branches: [main, master]
    paths:
      - 'testsprite/**'
      - 'testsprite.config.json'
      - 'backend/swagger.json'
      - '.github/workflows/testsprite.yml'
  workflow_dispatch:
    inputs:
      live_smoke:
        description: 'Also run live API smoke against a URL'
        type: boolean
        default: false
      api_url:
        description: 'API base URL for live smoke'
        type: string
        default: 'http://localhost:5184'

concurrency:
  group: testsprite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-specs:
    name: Validate API YAML vs OpenAPI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate TestSprite API YAML against swagger.json
        run: node testsprite/validate-specs.mjs

  live-api-smoke:
    name: Live API smoke
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.live_smoke == true }}
    runs-on: ubuntu-latest
    needs: validate-specs
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run live API smoke
        env:
          TESTSPRITE_API_URL: ${{ inputs.api_url }}
          TESTSPRITE_LOGIN: ${{ secrets.TESTSPRITE_LOGIN }}
          TESTSPRITE_PASSWORD: ${{ secrets.TESTSPRITE_PASSWORD }}
          TESTSPRITE_TENANT: ${{ vars.TESTSPRITE_TENANT || 'dev' }}
        run: node testsprite/run-api-smoke.mjs

  notify-failure:
    name: Notify on failure
    needs: [validate-specs]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: TestSprite workflow failed
    secrets: inherit
