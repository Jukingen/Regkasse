# Tenant websites (frontend-sites) — lint/typecheck/test/build

name: Frontend Sites CI

on:
  pull_request:
    paths:
      - 'frontend-sites/**'
      - '.github/workflows/frontend-sites-ci.yml'
  push:
    branches: [main, master]
    paths:
      - 'frontend-sites/**'
      - '.github/workflows/frontend-sites-ci.yml'
  workflow_dispatch:

concurrency:
  group: frontend-sites-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  NODE_VERSION: '22'

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-sites
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:5184

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-sites/package-lock.json

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: frontend-sites/node_modules
          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-sites-nm-${{ hashFiles('frontend-sites/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-sites-nm-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: npm run lint
        run: npm run lint

      - name: npm run typecheck
        run: npm run typecheck

      - name: npm run test
        run: npm run test

      - name: npm run build
        run: npm run build

  notify-failure:
    name: Notify on failure
    needs: [quality]
    if: failure()
    uses: ./.github/workflows/notify-failure.yml
    with:
      title: Frontend Sites CI failed
    secrets: inherit
