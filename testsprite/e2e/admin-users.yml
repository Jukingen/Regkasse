name: "Admin Panel - User Management"
description: "End-to-end user management flows"

tests:
  - name: "Login to admin panel"
    url: "http://localhost:3000/login"
    actions:
      - type: "fill"
        selector: "input[name='loginIdentifier']"
        value: "superadmin@regkasse.at"
      - type: "fill"
        selector: "input[name='password']"
        value: "{{password}}"
      - type: "click"
        selector: "button[type='submit']"
    expected:
      url: "http://localhost:3000/"
      element: ".dashboard"
      text: "Dashboard"

  - name: "Create user via Quick Create"
    url: "http://localhost:3000/admin/users"
    actions:
      - type: "click"
        selector: "button:contains('Neuen Benutzer')"
      - type: "click"
        selector: ".ant-tabs-tab:contains('Schnell anlegen')"
      - type: "select"
        selector: "select[name='role']"
        value: "Manager"
      - type: "click"
        selector: "button:contains('Generieren')"
    expected:
      element: ".ant-modal"
      text: "Benutzername: manager"
      text: "Passwort wurde generiert"

  - name: "Copy generated password"
    actions:
      - type: "click"
        selector: "button:contains('Passwort kopieren')"
    expected:
      clipboard: "contains"

  - name: "Edit username"
    url: "http://localhost:3000/admin/users"
    actions:
      - type: "click"
        selector: "tr:first-child button:contains('Benutzername ändern')"
      - type: "fill"
        selector: "input[name='newUsername']"
        value: "edited_user_{{timestamp}}"
      - type: "fill"
        selector: "textarea[name='reason']"
        value: "Test edit"
      - type: "click"
        selector: "button:contains('Speichern')"
    expected:
      element: ".ant-message-success"
      text: "Benutzername erfolgreich geändert"
