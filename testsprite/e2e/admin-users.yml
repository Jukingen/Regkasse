name: "Admin Panel - User Management"
description: "E2E user management on shared FA (admin.regkasse.at / localhost:3000)"
tags: [e2e, regression]

tests:
  - name: "Login to admin panel"
    url: "http://localhost:3000/login"
    actions:
      - type: "fill"
        selector: "input[name='loginIdentifier'], input[autocomplete='username']"
        value: "{{devAdmin.loginIdentifier}}"
      - type: "fill"
        selector: "input[name='password'], input[type='password']"
        value: "{{devAdmin.password}}"
      - type: "click"
        selector: "button[type='submit']"
    expected:
      url_not: "/login"

  - name: "Open Access & Roles → Users"
    url: "http://localhost:3000/admin/users"
    expected:
      element: "table, .ant-table"

  - name: "Open backup hub"
    url: "http://localhost:3000/backup"
    expected:
      url_contains: "/backup"
