name: "User Management"
description: "Admin user create / username / temporary password"
tags: [regression]

tests:
  - name: "List admin users"
    endpoint: "GET /api/admin/users"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200

  - name: "Create user with auto-generated username"
    endpoint: "POST /api/admin/users"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    body:
      email: "e2e-test-{{timestamp}}@test.com"
      role: "Manager"
      tenantId: "{{tenantId}}"
    expected:
      status: 201

  - name: "Generate temporary password"
    endpoint: "POST /api/admin/users/{{userId}}/generate-temporary-password"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    expected:
      status: 200
