name: "POS Operations"
description: "Cart, payment, receipt operations"

tests:
  - name: "Get products"
    endpoint: "GET /api/pos/list"
    headers:
      Authorization: "Bearer {{cashierToken}}"
      X-Tenant-Id: "test_cafe"
    expected:
      status: 200
      body: "array"
      minLength: 1

  - name: "Add item to cart"
    endpoint: "POST /api/pos/cart/add-item"
    headers:
      Authorization: "Bearer {{cashierToken}}"
    body:
      productId: "33333333-3333-3333-3333-333333333333"
      quantity: 2
      tableNumber: 1
    expected:
      status: 200

  - name: "Create payment"
    endpoint: "POST /api/pos/payment"
    headers:
      Authorization: "Bearer {{cashierToken}}"
    body:
      customerId: "walk-in"
      items:
        - productId: "33333333-3333-3333-3333-333333333333"
          quantity: 2
          taxType: 1
      payment:
        method: "cash"
        amount: 20.00
        tseRequired: true
      tableNumber: 1
      cashRegisterId: "{{registerId}}"
    expected:
      status: 201
      body:
        paymentId: "exists"
        receiptNumber: "matches pattern"

  - name: "Get receipt by payment ID"
    endpoint: "GET /api/Receipts/by-payment/{{paymentId}}"
    headers:
      Authorization: "Bearer {{cashierToken}}"
    expected:
      status: 200
      body:
        receiptNumber: "exists"
        grandTotal: 20.00
        signature: "exists"
