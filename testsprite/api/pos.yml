name: "POS Operations"
description: "POS catalog, cart, payment (canonical /api/pos/*)"
tags: [regression, fiscal]

notes: |
  Production POS: pos.regkasse.at + JWT tenant. Do not use {slug}.regkasse.at as POS entry.
  Payment bodies are high-risk — keep fixtures aligned with CreatePaymentRequest.

tests:
  - name: "Get POS product list"
    endpoint: "GET /api/pos/list"
    headers:
      Authorization: "Bearer {{cashierToken}}"
      X-Tenant-Id: "dev"
    expected:
      status: 200

  - name: "Get current cart"
    endpoint: "GET /api/pos/cart/current"
    headers:
      Authorization: "Bearer {{cashierToken}}"
    expected:
      status: 200

  - name: "Add item to cart"
    endpoint: "POST /api/pos/cart/add-item"
    headers:
      Authorization: "Bearer {{cashierToken}}"
    body:
      productId: "{{testProductId}}"
      quantity: 1
    expected:
      status: 200

  - name: "List payment methods"
    endpoint: "GET /api/pos/payment/methods"
    headers:
      Authorization: "Bearer {{cashierToken}}"
    expected:
      status: 200

  - name: "Create payment (cash / TSE)"
    endpoint: "POST /api/pos/payment"
    headers:
      Authorization: "Bearer {{cashierToken}}"
    body:
      # Align with live CreatePaymentRequest — keep minimal in docs; execute via live smoke carefully
      cashRegisterId: "{{registerId}}"
    expected:
      status: 201
