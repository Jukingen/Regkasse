name: "Backup & Restore API"
description: "Backup operations and verification"

tests:
  - name: "Get backup configuration"
    endpoint: "GET /api/admin/backup/settings"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    expected:
      status: 200
      body:
        enabled: "boolean"
        retentionDays: "number"

  - name: "Update backup schedule"
    endpoint: "PUT /api/admin/backup/settings"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    body:
      enabled: true
      scheduleCron: "0 3 * * *"
      retentionDays: 30
    expected:
      status: 200

  - name: "Get execution mode"
    endpoint: "GET /api/admin/backup/execution-mode"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    expected:
      status: 200
      body:
        effectiveUserFacingMode: "Fake|PgDump|ProductionStub"

  - name: "Get configuration health"
    endpoint: "GET /api/admin/backup/configuration-health"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    expected:
      status: 200
      body:
        level: "Healthy|Degraded|Unhealthy"
