name: "Multi-Tenant Isolation"
description: "Verify tenant data isolation and cross-tenant 404 semantics"
tags: [smoke, tenant, regression]

notes: |
  Production: tenant from JWT on shared hosts (pos/api/admin). Development: X-Tenant-Id / ?tenant= allowed.
  Cross-tenant resource access MUST return HTTP 404 (not 403).

tests:
  - name: "Tenant switcher returns tenants (Development)"
    endpoint: "GET /api/tenants/switcher"
    headers:
      X-Tenant-Id: "dev"
    expected:
      status: 200

  - name: "Cross-tenant payment access returns 404"
    endpoint: "GET /api/admin/payments/{{otherTenantPaymentId}}"
    headers:
      Authorization: "Bearer {{tenantAdminToken}}"
    expected:
      status: 404

  - name: "Super Admin can list tenants"
    endpoint: "GET /api/admin/tenants"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    expected:
      status: 200

  - name: "Super Admin can impersonate tenant"
    endpoint: "POST /api/admin/tenants/{{tenantId}}/impersonate"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    expected:
      status: 200
      body:
        token: "exists"
        tenantId: "exists"
