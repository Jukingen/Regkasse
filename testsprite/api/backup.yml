name: "Backup & Disaster Recovery API"
description: "Backup status, settings, compliance, costs (FA /backup hub)"
tags: [smoke, regression]

notes: |
  Mandanten-Admin: backup.manage (tenant). Super Admin: System dumps + execution mode.
  No production restore via API.

tests:
  - name: "Get latest backup status"
    endpoint: "GET /api/admin/backup/status/latest"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200

  - name: "List backup runs"
    endpoint: "GET /api/admin/backup/runs"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200

  - name: "Get backup settings"
    endpoint: "GET /api/admin/backup/settings"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200

  - name: "Get execution mode"
    endpoint: "GET /api/admin/backup/execution-mode"
    headers:
      Authorization: "Bearer {{superAdminToken}}"
    expected:
      status: 200

  - name: "Get recoverability summary"
    endpoint: "GET /api/admin/backup/recoverability-summary"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200

  - name: "Get compliance status"
    endpoint: "GET /api/admin/backup/compliance-status"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200

  - name: "Get storage costs"
    endpoint: "GET /api/admin/backup/storage-costs"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200

  - name: "Trigger manual backup"
    endpoint: "POST /api/admin/backup/trigger"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200
