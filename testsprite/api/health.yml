name: "API Health & Authentication"
description: "Verify backend is reachable and auth works (loginIdentifier)"
tags: [smoke, regression]

tests:
  - name: "Health check returns 200"
    endpoint: "GET /api/health"
    expected:
      status: 200
      body:
        status: "Healthy|Degraded"

  - name: "Login with email works"
    endpoint: "POST /api/Auth/login"
    body:
      loginIdentifier: "{{devAdmin.loginIdentifier}}"
      password: "{{devAdmin.password}}"
      clientApp: "admin"
    expected:
      status: 200
      body:
        token: "exists"
        refreshToken: "exists"

  - name: "Login with username works"
    endpoint: "POST /api/Auth/login"
    body:
      loginIdentifier: "{{manager.loginIdentifier}}"
      password: "{{manager.password}}"
      clientApp: "admin"
    expected:
      status: 200
      body:
        token: "exists"

  - name: "Invalid login returns 401"
    endpoint: "POST /api/Auth/login"
    body:
      loginIdentifier: "invalid@example.com"
      password: "wrong"
      clientApp: "admin"
    expected:
      status: 401

  - name: "Get current user info"
    endpoint: "GET /api/Auth/me"
    headers:
      Authorization: "Bearer {{token}}"
    expected:
      status: 200
      body:
        # shape varies by role; require authenticated payload
        id: "exists"
